<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Max - Assistant IA | Hamster</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet"/>
  <style>
    :root {
      --hamster-violet: #6B2FA0;
      --hamster-violet-light: #8B4BC8;
      --hamster-violet-pale: #F3EAFA;
      --hamster-white: #FFFFFF;
      --hamster-gray: #F7F4FB;
      --hamster-dark: #1C1028;
      --hamster-border: #E2D4F0;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--hamster-gray);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Header */
    header {
      width: 100%;
      background: var(--hamster-white);
      border-bottom: 1px solid var(--hamster-border);
      padding: 18px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      box-shadow: 0 2px 16px rgba(107, 47, 160, 0.07);
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    /* SVG Logo Hamster reconstitué */
    .logo-icon {
      width: 38px;
      height: 38px;
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 800;
      color: var(--hamster-dark);
      letter-spacing: -0.5px;
    }

    .agent-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--hamster-violet-pale);
      border: 1px solid var(--hamster-border);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 13px;
      color: var(--hamster-violet);
      font-weight: 500;
    }

    .agent-badge::before {
      content: '';
      width: 7px;
      height: 7px;
      background: #5CB85C;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.2); }
    }

    /* Chat container */
    .chat-wrapper {
      width: 100%;
      max-width: 780px;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 28px 20px;
      gap: 16px;
    }

    #n8n-chat {
      flex: 1;
      min-height: 70vh;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 32px rgba(107, 47, 160, 0.10);
      border: 1px solid var(--hamster-border);
      background: white;
    }

    /* Override n8n chat styles */
    :root {
      --chat--color-primary: #6B2FA0;
      --chat--color-primary-shade-50: #8B4BC8;
      --chat--color-primary-shade-100: #5A2788;
      --chat--color-secondary: #F3EAFA;
      --chat--color-secondary-shade-50: #E2D4F0;
      --chat--color-white: #ffffff;
      --chat--color-light: #F7F4FB;
      --chat--color-light-shade-50: #ede8f5;
      --chat--color-light-shade-100: #e0d8ef;
      --chat--color-medium: #9B72C8;
      --chat--color-dark: #1C1028;
      --chat--color-disabled: #C8B8E0;
      --chat--color-typing: #6B2FA0;
      --chat--header-background: #6B2FA0;
      --chat--header-color: #ffffff;
      --chat--message--bot--background: #F3EAFA;
      --chat--message--bot--color: #1C1028;
      --chat--message--user--background: #6B2FA0;
      --chat--message--user--color: #ffffff;
      --chat--input--background: #ffffff;
      --chat--input--border-color: #E2D4F0;
      --chat--input--text-color: #1C1028;
      --chat--input--placeholder--color: #9B72C8;
      --chat--border-radius: 12px;
      --chat--font-family: 'DM Sans', sans-serif;
    }

    /* Cacher branding n8n */
    .n8n-chat__powered-by,
    [class*="powered"],
    [class*="branding"] {
      display: none !important;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-container">
      <!-- Logo Hamster SVG -->
      <svg class="logo-icon" viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="4" width="42" height="42" rx="8" stroke="#6B2FA0" stroke-width="4" fill="none"/>
        <polyline points="4,46 4,14 18,4" stroke="#6B2FA0" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      <span class="logo-text">Hamster</span>
    </div>
    <div class="agent-badge">
      Max — Assistant IA · En ligne
    </div>
  </header>

  <div class="chat-wrapper">
    <div id="n8n-chat"></div>
  </div>



  <script type="module">
    import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

    createChat({
      webhookUrl: 'https://n8n.srv1163870.hstgr.cloud/webhook/79723dfd-52fa-4e30-8def-23c0b48aebab/chat',
      target: '#n8n-chat',
      mode: 'fullscreen',
      initialMessages: [
        'Salut ! Je suis Max, votre assistant Hamster. Comment puis-je vous aider ? 🇫🇷',
        'Hi! I\'m Max, your Hamster assistant. How can I help you? 🇬🇧'
      ],
      i18n: {
        en: {
          title: 'Max — Assistant Hamster',
          subtitle: 'Posez vos questions, je suis là pour vous aider.',
          inputPlaceholder: 'Écrivez votre message...',
          getStarted: 'Démarrer la conversation',
          closeButtonTooltip: 'Fermer',
        }
      }
    });
  </script>

</body>
</html>
