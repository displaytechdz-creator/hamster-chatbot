<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Max — Intelligence Hamster</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/@n8n/chat@0.27.0/dist/style.css" rel="stylesheet"/>
  <style>
    :root {
      --hamster-purple: #6B2D8B;
      --hamster-purple-light: #8B4DAB;
      --hamster-green: #5BBB4D;
      --bg-deep: #0A0418;
      --bg-mid: #150A2E;
      --bg-surface: rgba(20, 10, 40, 0.6);
      --border-glow: rgba(139, 77, 171, 0.3);
      --text-primary: #FFFFFF;
      --text-secondary: rgba(255, 255, 255, 0.7);
      --text-tertiary: rgba(255, 255, 255, 0.4);
      --accent-cyan: #00E5FF;
      --accent-violet: #B14EFF;

      --chat--color-primary: var(--hamster-purple);
      --chat--color-primary-shade-50: var(--hamster-purple-light);
      --chat--color-primary-shade-100: #4A1D63;
      --chat--color-secondary: rgba(107, 45, 139, 0.15);
      --chat--color-secondary-shade-50: rgba(107, 45, 139, 0.25);
      --chat--color-white: rgba(255, 255, 255, 0.04);
      --chat--color-light: rgba(255, 255, 255, 0.04);
      --chat--color-light-shade-50: rgba(255, 255, 255, 0.06);
      --chat--color-light-shade-100: rgba(255, 255, 255, 0.08);
      --chat--color-medium: rgba(255, 255, 255, 0.5);
      --chat--color-dark: #FFFFFF;
      --chat--color-disabled: rgba(255, 255, 255, 0.2);
      --chat--color-typing: var(--accent-cyan);
      --chat--message--bot--background: rgba(139, 77, 171, 0.12);
      --chat--message--bot--color: #FFFFFF;
      --chat--message--user--background: var(--hamster-purple);
      --chat--message--user--color: #FFFFFF;
      --chat--input--background: rgba(139, 77, 171, 0.15);
      --chat--input--border-color: rgba(139, 77, 171, 0.6);
      --chat--input--text-color: #FFFFFF;
      --chat--input--placeholder--color: rgba(255, 255, 255, 0.6);
      --chat--input--send--button--background: var(--hamster-purple);
      --chat--input--send--button--color: #FFFFFF;
      --chat--border-radius: 12px;
      --chat--font-family: 'Space Grotesk', sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .bg-grid {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(139, 77, 171, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(139, 77, 171, 0.06) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridShift 30s linear infinite;
      z-index: 0;
    }
    @keyframes gridShift {
      0% { background-position: 0 0; }
      100% { background-position: 60px 60px; }
    }

    .bg-orb {
      position: fixed; border-radius: 50%;
      filter: blur(80px); opacity: 0.4;
      pointer-events: none; z-index: 1;
    }
    .bg-orb.orb1 {
      width: 500px; height: 500px;
      top: -150px; right: -100px;
      background: radial-gradient(circle, var(--hamster-purple), transparent 70%);
      animation: orbFloat1 20s ease-in-out infinite;
    }
    .bg-orb.orb2 {
      width: 400px; height: 400px;
      bottom: -100px; left: -100px;
      background: radial-gradient(circle, var(--accent-violet), transparent 70%);
      animation: orbFloat2 25s ease-in-out infinite;
    }
    .bg-orb.orb3 {
      width: 300px; height: 300px;
      top: 40%; left: 60%;
      background: radial-gradient(circle, var(--hamster-green), transparent 70%);
      opacity: 0.15;
      animation: orbFloat3 18s ease-in-out infinite;
    }
    @keyframes orbFloat1 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-50px,50px) scale(1.1); } }
    @keyframes orbFloat2 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(60px,-40px) scale(1.15); } }
    @keyframes orbFloat3 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-30px,-30px); } }

    .topbar {
      position: relative; z-index: 10;
      padding: 14px 32px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(10, 4, 24, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-glow);
    }

    .brand { display: flex; align-items: center; gap: 16px; }
    .brand-logo {
      width: 42px; height: 42px;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, var(--hamster-purple), var(--accent-violet));
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(139, 77, 171, 0.4);
      position: relative;
    }
    .brand-logo svg { width: 24px; height: 24px; }
    .brand-logo::before {
      content: ''; position: absolute; inset: -2px;
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-violet));
      border-radius: 12px; z-index: -1; opacity: 0.6;
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 0.4; transform: scale(1); } 50% { opacity: 0.7; transform: scale(1.05); } }

    .brand-text { display: flex; flex-direction: column; }
    .brand-name {
      font-size: 18px; font-weight: 700;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #FFFFFF, var(--accent-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .brand-sub {
      font-size: 11px; font-weight: 500;
      color: var(--text-tertiary);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 1px; text-transform: uppercase;
    }

    .status-pill {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 14px;
      background: rgba(91, 187, 77, 0.1);
      border: 1px solid rgba(91, 187, 77, 0.3);
      border-radius: 100px;
      font-size: 12px; font-weight: 500;
      color: var(--hamster-green);
      font-family: 'JetBrains Mono', monospace;
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--hamster-green);
      box-shadow: 0 0 8px var(--hamster-green);
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    main {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      position: relative; z-index: 5;
      min-height: 0;
    }

    .chat-container {
      width: 100%; max-width: 900px;
      height: 100%; max-height: 800px;
      display: flex; flex-direction: column;
      background: var(--bg-surface);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid var(--border-glow);
      border-radius: 20px;
      overflow: hidden;
      position: relative;
      box-shadow:
        0 0 0 1px rgba(139, 77, 171, 0.1),
        0 20px 60px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .chat-container::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--hamster-purple), var(--accent-cyan), var(--accent-violet), transparent);
      background-size: 200% 100%;
      animation: scanLine 4s linear infinite;
    }
    @keyframes scanLine { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

    .welcome-area {
      padding: 28px 32px;
      border-bottom: 1px solid rgba(139, 77, 171, 0.15);
      display: flex; align-items: center; gap: 20px;
      background: linear-gradient(180deg, rgba(139, 77, 171, 0.08), transparent);
    }

    .avatar-container { position: relative; flex-shrink: 0; }
    .avatar {
      width: 64px; height: 64px; border-radius: 16px;
      background: linear-gradient(135deg, var(--hamster-purple), var(--accent-violet));
      display: flex; align-items: center; justify-content: center;
      position: relative;
      box-shadow: 0 8px 30px rgba(139, 77, 171, 0.4);
    }
    .avatar svg { width: 36px; height: 36px; }
    .avatar-pulse {
      position: absolute; inset: -4px;
      border-radius: 20px;
      background: linear-gradient(135deg, var(--accent-cyan), var(--hamster-purple));
      z-index: -1; opacity: 0.5;
      animation: avatarPulse 2.5s ease-in-out infinite;
    }
    @keyframes avatarPulse { 0%,100% { transform: scale(1); opacity: 0.4; } 50% { transform: scale(1.08); opacity: 0.7; } }
    .online-indicator {
      position: absolute; bottom: -2px; right: -2px;
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--hamster-green);
      border: 3px solid var(--bg-deep);
      box-shadow: 0 0 12px var(--hamster-green);
    }

    .welcome-text { flex: 1; min-width: 0; }
    .welcome-title {
      font-size: 22px; font-weight: 700;
      margin-bottom: 4px; letter-spacing: -0.4px;
    }
    .welcome-title .accent {
      background: linear-gradient(135deg, var(--accent-cyan), var(--accent-violet));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .welcome-desc {
      font-size: 13.5px; color: var(--text-secondary);
      line-height: 1.5; margin-bottom: 14px;
    }

    .capability-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .cap-tag {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 5px 11px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(139, 77, 171, 0.25);
      border-radius: 8px;
      font-size: 11.5px; font-weight: 500;
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.3px;
      transition: all 0.2s;
    }
    .cap-tag:hover {
      background: rgba(139, 77, 171, 0.12);
      border-color: rgba(139, 77, 171, 0.5);
      color: #FFF;
    }
    .cap-tag svg { width: 12px; height: 12px; }
    .cap-tag.cyan { color: var(--accent-cyan); border-color: rgba(0, 229, 255, 0.3); }
    .cap-tag.green { color: var(--hamster-green); border-color: rgba(91, 187, 77, 0.3); }

    #n8n-chat {
      flex: 1; min-height: 0;
      display: flex; flex-direction: column;
    }

    .chat-layout, .chat-window {
      background: transparent !important;
    }

    .chat-messages-list::-webkit-scrollbar { width: 6px; }
    .chat-messages-list::-webkit-scrollbar-track { background: transparent; }
    .chat-messages-list::-webkit-scrollbar-thumb {
      background: rgba(139, 77, 171, 0.4); border-radius: 3px;
    }
    .chat-messages-list::-webkit-scrollbar-thumb:hover { background: rgba(139, 77, 171, 0.7); }

    /* Force input area to be visible */
    .chat-input,
    .chat-inputs,
    [class*="chat-input"] {
      background: rgba(20, 10, 40, 0.8) !important;
      border-top: 1px solid rgba(139, 77, 171, 0.3) !important;
      padding: 16px 20px !important;
    }
    .chat-input textarea,
    .chat-input input,
    [class*="chat-input"] textarea,
    [class*="chat-input"] input {
      background: rgba(139, 77, 171, 0.12) !important;
      border: 1px solid rgba(139, 77, 171, 0.5) !important;
      border-radius: 10px !important;
      color: #FFFFFF !important;
      padding: 12px 16px !important;
      font-family: 'Space Grotesk', sans-serif !important;
      font-size: 14px !important;
    }
    .chat-input textarea:focus,
    .chat-input input:focus {
      border-color: var(--accent-cyan) !important;
      box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.15) !important;
      outline: none !important;
    }
    .chat-input button,
    [class*="chat-input"] button,
    button[class*="send"] {
      background: linear-gradient(135deg, var(--hamster-purple), var(--accent-violet)) !important;
      border-radius: 10px !important;
      color: #FFFFFF !important;
    }

    .footer {
      position: relative; z-index: 10;
      padding: 12px 32px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      font-size: 11px;
      color: var(--text-tertiary);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 1px; text-transform: uppercase;
      border-top: 1px solid rgba(139, 77, 171, 0.15);
      background: rgba(10, 4, 24, 0.6);
      backdrop-filter: blur(20px);
    }
    .footer-divider {
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--hamster-purple);
      box-shadow: 0 0 6px var(--hamster-purple);
    }

    @media (max-width: 768px) {
      .topbar { padding: 12px 16px; }
      .brand-logo { width: 36px; height: 36px; }
      .brand-name { font-size: 15px; }
      .brand-sub { font-size: 10px; }
      .status-pill { padding: 4px 10px; font-size: 11px; }
      main { padding: 12px; }
      .chat-container { border-radius: 16px; max-height: none; }
      .welcome-area { padding: 20px; gap: 14px; flex-direction: column; align-items: flex-start; }
      .avatar { width: 52px; height: 52px; }
      .avatar svg { width: 28px; height: 28px; }
      .welcome-title { font-size: 18px; }
      .welcome-desc { font-size: 12.5px; }
      .footer { padding: 10px 16px; font-size: 10px; }
    }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .topbar { animation: fadeUp 0.5s ease-out 0s both; }
    .chat-container { animation: fadeUp 0.6s ease-out 0.1s both; }
    .footer { animation: fadeUp 0.5s ease-out 0.2s both; }
  </style>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="bg-orb orb3"></div>

  <div class="topbar">
    <div class="brand">
      <div class="brand-logo">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="3" y="3" width="34" height="34" rx="5" stroke="#FFFFFF" stroke-width="3" fill="none"/>
          <polyline points="3,37 3,13 13,3" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>
      </div>
      <div class="brand-text">
        <div class="brand-name">HAMSTER × MAX</div>
        <div class="brand-sub">Neural Product Assistant</div>
      </div>
    </div>
    <div class="status-pill">
      <span class="status-dot"></span>
      <span>SYSTEM ONLINE</span>
    </div>
  </div>

  <main>
    <div class="chat-container">
      <div class="welcome-area">
        <div class="avatar-container">
          <div class="avatar-pulse"></div>
          <div class="avatar">
            <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="3" y="3" width="34" height="34" rx="5" stroke="#FFFFFF" stroke-width="3" fill="none"/>
              <polyline points="3,37 3,13 13,3" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            </svg>
          </div>
          <div class="online-indicator"></div>
        </div>
        <div class="welcome-text">
          <h2 class="welcome-title">Bonjour, je suis <span class="accent">Max</span></h2>
          <p class="welcome-desc">Assistant IA Hamster &mdash; recherche produits, compatibilit&eacute;, support technique. Posez votre question, je trouve la r&eacute;ponse.</p>
          <div class="capability-tags">
            <span class="cap-tag">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
              CATALOG.DB
            </span>
            <span class="cap-tag cyan">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              WEB.SEARCH
            </span>
            <span class="cap-tag green">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              VERIFIED
            </span>
          </div>
        </div>
      </div>
      <div id="n8n-chat"></div>
    </div>
  </main>

  <div class="footer">
    <span>HAMSTER NEURAL CORE</span>
    <div class="footer-divider"></div>
    <span>MAX v4.0</span>
    <div class="footer-divider"></div>
    <span>ENCRYPTED CHANNEL</span>
  </div>

  <script type="module">
    import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat@0.27.0/dist/chat.bundle.es.js';
    createChat({
      webhookUrl: 'https://n8n.srv1163870.hstgr.cloud/webhook/79723dfd-52fa-4e30-8def-23c0b48aebab/chat',
      target: '#n8n-chat',
      mode: 'fullscreen',
      showWelcomeScreen: false,
      initialMessages: [
        'Salut ! Je suis Max, votre assistant Hamster intelligent. 🚀\n\nVous pouvez me demander n\'importe quoi sur nos produits : SKU, compatibilité, garantie, recommandations.',
        'Hi! I\'m Max, your intelligent Hamster assistant. 🚀\n\nAsk me anything about our products: SKU, compatibility, warranty, recommendations.'
      ],
      i18n: {
        en: {
          title: '',
          subtitle: '',
          footer: '',
          getStarted: 'New Conversation',
          inputPlaceholder: 'Type your message... / Écrivez votre message...',
          closeButtonTooltip: 'Close'
        }
      }
    });
  </script>

</body>
</html>
